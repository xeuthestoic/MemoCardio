<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MemoGlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h1>MemoGlow</h1>
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<div id="dashboard" class="hidden">
  <h2>Matières</h2>
  <button onclick="addCard()">+ Ajouter</button>
  <div id="subjects"></div>
</div>

<div id="cardsPage" class="hidden">
  <button onclick="goBack()">⬅ Retour</button>
  <div id="card" class="card" onclick="flipCard()">
    <div class="front"></div>
    <div class="back"></div>
  </div>
  <button onclick="nextCard()">Suivant</button>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
