<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MemoCardio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h1>MemoCardio</h1>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Mot de passe">
  <div id="loading" class="hidden">Connexion...</div>
  <button id="loginBtn">Entrer</button>
</div>

<!-- 📚 DASHBOARD -->
<div id="dashboard" class="hidden">
  <h2>Matières</h2>
  <div id="subjects"></div>
</div>

<!-- 🧠 CARDS -->
<div id="cardsPage" class="hidden">

  <div class="card-container">

    <button onclick="goBack()">⬅ Retour</button>

    <div id="card" class="card" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-face front"></div>
        <div class="card-face card-back"></div>
      </div>
    </div>

    <button onclick="nextCard()">Suivant ➡</button>

  </div>

</div>

<script src="data.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
