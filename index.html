<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>MemoCardio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h1>MemoCardio</h1>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Mot de passe">
  <div id="loading" style="display:none;">Connexion...</div>
  <button id="loginBtn">Entrer</button>
</div>

<!-- 📚 DASHBOARD -->
<div id="dashboard">
  <h2>Matières</h2>
  <button id="backBtn" style="display:none;">⬅ Retour</button>
  <div id="subjects"></div>
</div>

<!-- 🧠 CARDS -->
<div id="cardsPage">
  <div class="card-container">
    <div class="card-nav">
      <button onclick="goBack()">⬅ Retour</button>
      <button onclick="nextCard()">Suivant ➡</button>
    </div>
    <div id="card" class="card" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-face front"></div>
        <div class="card-face card-back"></div>
      </div>
    </div>
    <p class="card-hint">Tape la carte pour retourner</p>
  </div>
</div>

<script src="data.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
